name: Publish Caddie HQ to gh-pages

# Mirrors main to the gh-pages branch, which GitHub Pages serves.
# (The default Actions token can't enable a Pages site directly,
# so we use branch-based Pages instead of the deploy-pages action.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push -f origin HEAD:gh-pages
